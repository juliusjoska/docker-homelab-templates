# Prometheus konfigurace
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus sam sebe
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (pokud bezi)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Pridejte dalsi targety podle potreby
  # - job_name: "my-app"
  #   static_configs:
  #     - targets: ["app:8080"]
